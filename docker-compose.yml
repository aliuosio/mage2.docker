volumes:
  # rabbitmq_data:
  elastic_data :
  redis_socket_cache:
  redis_socket_session:
  db_socket:
  db_data:
  app_data:
    driver_opts:
      type: none
      o: bind
      device: ${WORKDIR}
  composer_cache:
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.composer

networks:
  default:
    ipam:
      config:
        - subnet: 172.19.0.0/16